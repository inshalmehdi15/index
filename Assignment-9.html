<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Bio Formatter</title>
</head>
<body>
    <h2>Student Bio Formatter</h2>

    <input id="sfn" placeholder=" Student Full Name">
    <br><br>
    <input id="city" placeholder="City">
    <br><br>
    <input id="si" placeholder="Short Introduction">
    <br><br>
     <button id="formatBtn">Format Information</button>
    <button id="checkBtn">Check Name</button>


     <div id="output"></div>


</body>
<script>
    let sfn = document.querySelector("#sfn")
    let city = document.querySelector("#si")
    let si = document.querySelector("#city")
    let formatBtn = document.querySelector("#formatBtn")
    let checkBtn = document.querySelector("#checkBtn")
    let output = document.querySelector("#output")

    
<html>

    
    
    

    
        function formatInformation() {

            // trim()
            let cleanName = nameInput.value.trim();

            // length
            let nameLength = cleanName.length;

            // slice() for first name
            let spaceIndex = cleanName.indexOf(" ");

            let firstName;

            if (spaceIndex == -1) {
                firstName = cleanName;
            } else {
                firstName = cleanName.slice(0, spaceIndex);
            }

            // toUpperCase()
            let upperName = cleanName.toUpperCase();

            // toLowerCase()
            let lowerCity = cityInput.value.toLowerCase();

            // replaceAll()
            let updatedIntro = introInput.value.replaceAll("student", "developer");

            // substring()
            let firstTwenty = updatedIntro.substring(0, 20);

            output.innerHTML =
                "<h3>Formatted Information</h3>" +

                "<b>Clean Name:</b> " + cleanName + "<br><br>" +

                "<b>Name Length:</b> " + nameLength + "<br><br>" +

                "<b>First Name:</b> " + firstName + "<br><br>" +

                "<b>Uppercase Name:</b> " + upperName + "<br><br>" +

                "<b>City:</b> " + lowerCity + "<br><br>" +

                "<b>Updated Introduction:</b> " + updatedIntro + "<br><br>" +

                "<b>First 20 Characters:</b> " + firstTwenty;
        }

        function checkName() {

            let cleanName = nameInput.value.trim();

            if (cleanName.indexOf("Bilal") != -1) {
                output.innerHTML += "<br><br><b>Bilal is present in the name.</b>";
            } else {
                output.innerHTML += "<br><br><b>Bilal is not present.</b>";
            }

        }

        formatBtn.addEventListener("click", formatInformation);

        checkBtn.addEventListener("click", checkName);

    </script>

</body>
</html>
</script>
</html>
