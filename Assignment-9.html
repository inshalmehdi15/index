<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Bio Formatter</title>
</head>
<body>

    <h1>Student Bio Formatter</h1>

    <label>Student Full Name</label><br>
    <input type="text" id="name" placeholder="Enter Full Name"><br><br>

    <label>City</label><br>
    <input type="text" id="city" placeholder="Enter City"><br><br>

    <label>Short Introduction</label><br>
    <textarea id="intro" rows="5" cols="40" placeholder="Enter Introduction"></textarea><br><br>

    <button id="formatBtn">Format Information</button>
    <button id="checkBtn">Check Name</button>

    <hr>

    <div id="output"></div>
    <div id="checkOutput"></div>

    <script>
        let formatBtn = document.getElementById("formatBtn");
        let checkBtn = document.getElementById("checkBtn");

        formatBtn.addEventListener("click", function () {

            let name = document.getElementById("name").value;
            let city = document.getElementById("city").value;
            let intro = document.getElementById("intro").value;

            // trim()
            let cleanName = name.trim();

            // length
            let nameLength = cleanName.length;

            // slice()
            let spaceIndex = cleanName.indexOf(" ");
            let firstName;

            if (spaceIndex == -1) {
                firstName = cleanName;
            } else {
                firstName = cleanName.slice(0, spaceIndex);
            }

            // toUpperCase()
            let upperName = cleanName.toUpperCase();

            // toLowerCase()
            let lowerCity = city.toLowerCase();

            // replaceAll()
            let updatedIntro = intro.replaceAll("student", "developer");

            // substring()
            let first20 = updatedIntro.substring(0, 20);

            document.getElementById("output").innerHTML =
                "<h3>Formatted Information</h3>" +
                "<b>Clean Name:</b> " + cleanName + "<br><br>" +
                "<b>Name Length:</b> " + nameLength + "<br><br>" +
                "<b>First Name:</b> " + firstName + "<br><br>" +
                "<b>Uppercase Name:</b> " + upperName + "<br><br>" +
                "<b>City:</b> " + lowerCity + "<br><br>" +
                "<b>Updated Introduction:</b> " + updatedIntro + "<br><br>" +
                "<b>First 20 Characters:</b> " + first20;
        });

        checkBtn.addEventListener("click", function () {

            let name = document.getElementById("name").value.trim();

            if (name.indexOf("Bilal") != -1) {
                document.getElementById("checkOutput").innerHTML =
                    "<h3>Bilal is present in the name.</h3>";
            } else {
                document.getElementById("checkOutput").innerHTML =
                    "<h3>Bilal is not present.</h3>";
            }

        });
    </script>

</body>
</html>
